name: Lint

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint and calculate score
        run: |
          mkdir -p .badges
          npm run lint > lint-output.txt 2>&1 || true
          
          echo "=== Debug: Lint Output ==="
          cat lint-output.txt
          echo "=========================="

          # Count total files and files with problems
          TOTAL=$(find src __tests__ -name '*.ts' -o -name '*.js' | wc -l | tr -d ' ')
          echo "DEBUG: TOTAL files = $TOTAL"
          
          PROBLEMS=$(grep -c "problem" lint-output.txt || echo "0")
          echo "DEBUG: PROBLEMS count = $PROBLEMS"
          
          CLEAN=$((TOTAL - PROBLEMS))
          echo "DEBUG: CLEAN files = $CLEAN"
          
          PERCENTAGE=$((CLEAN * 100 / TOTAL))
          echo "DEBUG: PERCENTAGE = $PERCENTAGE%"

          # Determine color
          if [ $PERCENTAGE -ge 90 ]; then COLOR="brightgreen"; 
          elif [ $PERCENTAGE -ge 70 ]; then COLOR="yellow";
          else COLOR="orange"; fi
          echo "DEBUG: COLOR = $COLOR"

          # Create badge JSON
          echo "{\"schemaVersion\": 1, \"label\": \"lint\", \"message\": \"${PERCENTAGE}%\", \"color\": \"${COLOR}\"}" > .badges/lint.json
          cat .badges/lint.json
        continue-on-error: true

      - name: Commit badge data
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .badges/lint.json
          git diff --staged --quiet || git commit -m "Update lint badge [skip ci]"
          git pull --rebase origin main
          git push
